{% extends "base.html" %}
{% block content %}

<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #f5f6fa; }

  /* Allow this page to use the full width so the sidebar sits at the left edge */
  .container { max-width: none; margin: 0; padding: 0; }

  .layout {
    display: flex;
    height: 90vh;
  }

  .sidebar {
    width: 220px;
    background: white;
    border-right: 1px solid #ddd;
    padding: 20px;
  }

  .sidebar h3 {
    margin-top: 0;
  }

  .sidebar a {
    display: block;
    padding: 8px 0;
    text-decoration: none;
    color: #333;
  }

  .sidebar a:hover {
    color: #1a73e8;
  }

  .main {
    flex: 1;
    padding: 30px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .btn {
    padding: 8px 14px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .btn:hover {
    background: #1669c1;
  }

  .files-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
  }

  .file-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    text-align: center;
    cursor: pointer;
  }

  .file-card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .file-icon {
    font-size: 40px;
    margin-bottom: 10px;
  }
</style>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Secure Drive</h3>
    <a href="#">My Files</a>
    <a href="#">Shared With Me</a>
    <a href="#">Settings</a>
  </div>

  <!-- Main Content -->
  <div class="main">

    <div class="topbar">
      <div>
        <h2>Welcome, {{ username }}</h2>
        <!-- <small>Private key loaded: {{ "Yes" if has_privkey else "No" }}</small> -->
      </div>

      <form method="post" action="{{ url_for('logout') }}">
        <button class="btn">Logout</button>
      </form>
    </div>

    <button class="btn" style="margin-bottom:20px;">+ New File</button>

    <div class="files-grid">
      <!-- Dummy Files -->
      <div class="file-card">
        <div class="file-icon">📄</div>
        <div>Report.pdf</div>
      </div>

      <div class="file-card">
        <div class="file-icon">📁</div>
        <div>Project Docs</div>
      </div>

      <div class="file-card">
        <div class="file-icon">📊</div>
        <div>Budget.xlsx</div>
      </div>
    </div>

  </div>
</div>

{% endblock %}
